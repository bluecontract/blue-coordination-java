name: Persistent BEX Counter
counter: 0
contracts:
  ownerChannel:
    type: Coordination/Timeline Channel
    timelineId: owner
  increment:
    type: Coordination/Sequential Workflow Operation
    channel: ownerChannel
    steps:
      - name: BuildPatch
        type: Coordination/Compute
        do:
          - $appendChange:
              op: replace
              path: /counter
              val:
                $add:
                  - $document: /counter
                  - $binding:
                      name: event
                      path: /message/request
          - $return:
              changeset:
                $changeset: true
              events:
                $events: true
