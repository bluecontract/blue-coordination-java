                                      "default": {
                                      }
                                    }
                                  }
                                }
                              }
                            },
                            {
                              "$let": {
                                "name": "targetPath",
                                "expr": {
                                  "$choose": {
                                    "cond": {
                                      "$eq": [
                                        {
                                          "$var": "kind"
