                                      }
                                    }
                                  }
                                }
                              }
                            },
                            {
                              "$let": {
                                "name": "expectedKind",
                                "expr": {
                                  "$choose": {
                                    "cond": {
                                      "$or": [
                                        {
                                          "$eq": [
                                            {
                                              "$var": "kind"
                                            },
                                            "hotel"
                                          ]
                                        },
                                        {
                                          "$eq": [
                                            {
                                              "$var": "kind"
                                            },
                                            "restaurant"
                                          ]
                                        }
                                      ]
                                    },
                                    "then": "Order",
                                    "else": ""
                                  }
                                }
                              }
                            },
                            {
                              "$let": {
                                "name": "context",
                                "expr": {
                                  "$object": {
                                    "$pointerGet": {
                                      "object": {
                                        "$var": "snapshot"
