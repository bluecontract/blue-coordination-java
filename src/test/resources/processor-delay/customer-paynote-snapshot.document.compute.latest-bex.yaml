                                    }
                                  }
                                ]
                              }
                            },
                            {
                              "$return": {
                                "changeset": [
                                  {
                                    "op": "add",
                                    "path": {
                                      "$var": "targetPath"
                                    },
                                    "val": {
                                      "$var": "snapshot"
                                    }
                                  }
                                ],
                                "events": [
                                  {
                                    "type": "Coordination/Event",
                                    "kind": "Component Order Attached",
                                    "orderKind": {
                                      "$var": "kind"
                                    }
                                  }
                                ]
                              }
                            }
                          ]
                        }
                      ]
                    }
                  }
