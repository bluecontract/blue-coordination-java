                                      "default": {
                                      }
                                    }
                                  }
                                }
                              }
                            },
                            {
                              "$let": {
                                "name": "snapshotOrderKind",
                                "expr": {
                                  "$coalesce": [
                                    {
                                      "$text": {
                                        "$pointerGet": {
                                          "object": {
                                            "$var": "snapshot"
                                          },
                                          "path": "/orderKind",
                                          "default": ""
                                        }
                                      }
                                    },
                                    {
                                      "$text": {
                                        "$pointerGet": {
                                          "object": {
                                            "$var": "context"
                                          },
                                          "path": "/orderKind",
                                          "default": ""
                                        }
                                      }
                                    }
                                  ]
                                }
                              }
                            },
                            {
                              "$if": {
                                "cond": {
                                  "$or": [
                                    {
                                      "$not": {
                                        "$var": "targetPath"
                                      }
                                    },
                                    {
                                      "$ne": [
                                        {
                                          "$text": {
                                            "$pointerGet": {
                                              "object": {
                                                "$var": "snapshot"
                                              },
                                              "path": "/kind",
                                              "default": ""
                                            }
                                          }
                                        },
                                        {
                                          "$var": "expectedKind"
                                        }
                                      ]
                                    },
                                    {
                                      "$ne": [
                                        {
                                          "$var": "snapshotOrderKind"
                                        },
                                        {
                                          "$var": "kind"
                                        }
                                      ]
                                    },
                                    {
                                      "$ne": [
                                        {
                                          "$text": {
                                            "$pointerGet": {
                                              "object": {
                                                "$var": "context"
                                              },
                                              "path": "/packageOrderDocumentId",
                                              "default": ""
                                            }
                                          }
                                        },
                                        {
                                          "$text": {
                                            "$document": "/context/packageOrderDocumentId"
                                          }
                                        }
                                      ]
                                    }
                                  ]
                                },
                                "then": [
                                  {
                                    "$return": {
                                      "changeset": [

                                      ],
                                      "events": [
                                        {
                                          "type": "Coordination/Event",
                                          "kind": "Component Order Attachment Rejected",
                                          "orderKind": {
                                            "$var": "kind"
                                          }
                                        }
                                      ]
                                    }
                                  }
                                ]
                              }
                            },
                            {
                              "$let": {
                                "name": "existing",
                                "expr": {
                                  "$object": {
                                    "$document": {
                                      "path": {
                                        "$var": "targetPath"
                                      }
                                    }
                                  }
                                }
                              }
                            },
                            {
                              "$if": {
                                "cond": {
                                  "$gt": [
                                    {
                                      "$size": {
                                        "$keys": {
                                          "$var": "existing"
                                        }
                                      }
                                    },
                                    0
                                  ]
                                },
                                "then": [
                                  {
                                    "$return": {
                                      "changeset": [

                                      ],
                                      "events": [
                                        {
                                          "type": "Coordination/Event",
                                          "kind": "Component Order Attachment Rejected",
                                          "orderKind": {
                                            "$var": "kind"
                                          },
                                          "reason": "component_order_already_attached"
