                          "name": "BuildComponentAttachment",
                          "type": "Coordination/Compute",
                          "emitEvents": true,
                          "returnResult": true,
                          "do": [
                            {
                              "$let": {
                                "name": "req",
                                "expr": {
                                  "$object": {
                                    "$event": "/message/request"
